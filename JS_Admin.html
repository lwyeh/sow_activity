<script>
// ================================================================
//  JS_Admin.html - 管理後台邏輯 (成員、家庭、活動、匯入、升級)
// ================================================================

function doLogin() {
  var user = document.getElementById('admin-user').value.trim();
  var pass = document.getElementById('admin-pwd').value.trim();
  
  if (!user || !pass) { 
    toast('請輸入完整的帳號與密碼！', 'warn'); 
    return; 
  }

  var btn = document.getElementById('admin-login-btn');
  if (btn) {
    btn.disabled = true; 
    btn.textContent = '身分驗證中...';
  }

  // 呼叫後端的 verifyAdminLogin API
  gas('verifyAdminLogin', user, pass).then(function(res) {
    if (res.success) {
      toast('登入成功！', 'success');
      
      // 隱藏登入框，顯示後台主畫面
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('admin-body').style.display = 'block';
      
      setMenuByRole(res.role);

      S.adminAuth = true; 
      document.getElementById('admin-pwd').value = ''; // 安全起見清空密碼
      
      // ★ 核心修復：登入成功後，立刻載入並繪製後台所有的資料與清單！
      loadAdminData();
      
      // 觸發收費系統預載
      if (typeof loadPayActs === 'function') loadPayActs();
      
    } else {
      toast(res.msg || '登入失敗，請檢查帳號密碼', 'error');
    }
  }).catch(function(e) {
    console.error(e);
    toast('系統連線錯誤', 'error');
  }).finally(function() {
    if (btn) {
      btn.disabled = false; 
      btn.textContent = '登入';
    }
  });
}

// 控制選單顯示/隱藏的函數
function setMenuByRole(role) {
  
  // 1. 為了安全，我們先把所有選單都隱藏起來 (display = 'none')
  document.getElementById('atab-members').style.display = 'none';
  document.getElementById('atab-families').style.display = 'none';
  document.getElementById('atab-activities').style.display = 'none';
  document.getElementById('atab-roster').style.display = 'none';
  document.getElementById('atab-payacts').style.display = 'none';
  document.getElementById('atab-paycheck').style.display = 'none';
  document.getElementById('atab-payreport').style.display = 'none';
  document.getElementById('atab-attendstat').style.display = 'none';

  // 2. 根據不同角色，把對應的選單打開 (display = 'block' 或是 'inline-block')
  if (role === 'admin') {
    // admin: 全開
    document.getElementById('atab-members').style.display = 'block';
    document.getElementById('atab-families').style.display = 'block';
    document.getElementById('atab-activities').style.display = 'block';
    document.getElementById('atab-roster').style.display = 'block';
    document.getElementById('atab-payacts').style.display = 'block';
    document.getElementById('atab-paycheck').style.display = 'block';
    document.getElementById('atab-payreport').style.display = 'block';
    document.getElementById('atab-attendstat').style.display = 'block';

    document.getElementById('atab-members').click();
    
  } else if (role === 'userdata') {
    // userdata: 只開前四個
    document.getElementById('atab-members').style.display = 'block';
    document.getElementById('atab-families').style.display = 'block';
    document.getElementById('atab-activities').style.display = 'block';
    document.getElementById('atab-roster').style.display = 'block';
    document.getElementById('atab-attendstat').style.display = 'block';

    document.getElementById('atab-members').click();
    
  } else if (role === 'finance') {
    // finance: 只開後三個
    document.getElementById('atab-payacts').style.display = 'block';
    document.getElementById('atab-paycheck').style.display = 'block';
    document.getElementById('atab-payreport').style.display = 'block';

    document.getElementById('atab-payacts').click();
  }
}

function doLogout() {
  S.adminAuth = false;
  document.getElementById('admin-login').style.display = 'block';
  document.getElementById('admin-body').style.display  = 'none';
  document.getElementById('admin-pwd').value = '';
}

function showAdminTab(name) {
  ['members','families','activities','roster','payacts','paycheck','payreport','attendstat'].forEach(function(t) {
    var el = document.getElementById('aTab-' + t);
    if(el) el.style.display = t === name ? 'block' : 'none';
    var btn = document.getElementById('atab-' + t);
    if(btn) btn.classList.toggle('active', t === name);
  });
  // 已移除 act-stats-section 的顯示邏輯
  if (name === 'roster'      && typeof loadRoster      === 'function') loadRoster();
  if (name === 'payacts'     && typeof loadPayActs      === 'function') loadPayActs();
  if (name === 'paycheck'    && typeof loadPayCheck     === 'function') loadPayCheck();
  if (name === 'attendstat'  && typeof loadAttendStat   === 'function') loadAttendStat();
}

function loadAdminData() {
  return loadAllData().then(function() {
    renderMembersList();
    renderFamiliesList();
    renderActivitiesAdminList();
    populateFamilySelects();
    populateFilterFamilySelect();
  });
}

function populateFamilySelects() {
  var selIds = ['mem-family', 'filter-family'];
  selIds.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var emptyLabel = id === 'filter-family' ? '所有家庭' : '- 選擇家庭 -';
    el.innerHTML = '<option value="">' + emptyLabel + '</option>';
    S.families.forEach(function(f){ el.innerHTML += '<option value="' + f.id + '">' + f.name + '</option>'; });
  });
}

function populateFilterFamilySelect() {
  var el = document.getElementById('filter-family');
  if (!el) return;
  el.innerHTML = '<option value="">所有家庭</option>';
  S.families.forEach(function(f){ el.innerHTML += '<option value="' + f.id + '">' + f.name + '</option>'; });
}

// ── 成員管理 ──────────────────────────────────────────────────────

function filterMembers() {
  var troop  = document.getElementById('filter-troop').value;
  var squad  = document.getElementById('filter-squad').value;
  var famId  = document.getElementById('filter-family').value;
  var name   = document.getElementById('filter-name').value.toLowerCase();

  var filtered = S.members.filter(function(m) {
    if (troop && m.troop !== troop) return false;
    if (squad && m.squad !== squad) return false;
    if (famId && String(m.familyId) !== String(famId)) return false;
    if (name  && (m.naturalName||'').toLowerCase().indexOf(name) < 0 && m.name.toLowerCase().indexOf(name) < 0) return false;
    return true;
  });
  renderMembersList(filtered);
}

function renderMembersList(list) {
  var members = list || S.members;
  var el = document.getElementById('members-list');
  var headerTab = document.getElementById('atab-members');
  if(headerTab) headerTab.textContent = '🧑 成員管理';
  
  if (!members.length) { el.innerHTML = '<div class="empty">無成員資料</div>'; return; }
  el.innerHTML = members.map(function(m) {
    return '<div class="mem-card">' +
      '<div class="mem-card-info" style="flex:1">' +
        '<div class="mname">' + esc(m.name) + (m.naturalName ? ' <span style="font-size:24px;color:var(--ink-soft)">(' + esc(m.naturalName) + ')</span>' : '') + '</div>' +
        '<div class="mmeta">' +
          '<span class="tag">🏠 ' + esc(m.familyName || m.familyId) + '</span>' +
          '<span class="tag">' + (m.role || '') + '</span>' +
          (m.troop ? '<span class="tag">' + m.troop + '</span>' : '') +
          (m.grade ? '<span class="tag">' + m.grade + '</span>' : '') +
          (m.squad && m.squad !== '無' ? '<span class="tag">' + m.squad + '</span>' : '') +
          (m.position ? '<span class="tag">' + m.position + '</span>' : '') +
          (m.remark ? '<div style="font-size:20px;color:var(--ink-soft);margin-top:4px">📝 ' + esc(m.remark) + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:6px">' +
        '<button class="btn btn-outline btn-xs" data-mid="' + m.id + '" onclick="editMemberById(this.getAttribute(\'data-mid\'))">編輯</button>' +
        '<button class="btn btn-danger btn-xs" data-mid="' + m.id + '" onclick="deleteMemberById(this.getAttribute(\'data-mid\'))">刪除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function quickAddFamily() {
  var form = document.getElementById('quick-family-form');
  var nameEl = document.getElementById('quick-family-name');
  form.style.display = 'block';
  nameEl.value = '';
  nameEl.focus();
}

function cancelQuickFamily() {
  document.getElementById('quick-family-form').style.display = 'none';
  document.getElementById('quick-family-name').value = '';
}

function confirmQuickFamily() {
  var name = document.getElementById('quick-family-name').value.trim();
  if (!name) { toast('請輸入家庭名稱', 'warn'); return; }

  gas('saveFamily', { id: null, name: name }).then(function(res) {
    toast('家庭「' + name + '」已建立', 'success');
    cancelQuickFamily();
    return loadAllData().then(function() {
      var famSel = document.getElementById('mem-family');
      famSel.innerHTML = '<option value="">- 選擇家庭 -</option>';
      S.families.forEach(function(f){ famSel.innerHTML += '<option value="' + f.id + '">' + esc(f.name) + '</option>'; });
      famSel.value = res.id;
    });
  }).catch(function() { toast('建立失敗', 'error'); });
}

function openMemberModal() {
  document.getElementById('modal-member-title').textContent = '新增成員';
  ['mem-id','mem-name','mem-natural','mem-phone','mem-email','mem-no','mem-birth','mem-join'].forEach(function(id){ document.getElementById(id).value = ''; });
  ['mem-family','mem-gender','mem-troop','mem-grade','mem-position','mem-squad'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.selectedIndex = 0;
  });
  document.getElementById('mem-role').value = '家長';
  document.getElementById('mem-remark').value = '';
  openModal('modal-member');
}

function editMemberById(mid) {
  var m = findById(S.members, mid);
  if (!m) { toast('找不到成員', 'error'); return; }
  document.getElementById('modal-member-title').textContent = '編輯成員';
  document.getElementById('mem-id').value      = m.id;
  document.getElementById('mem-name').value    = m.name;
  document.getElementById('mem-natural').value = m.naturalName || '';
  document.getElementById('mem-phone').value   = m.phone || '';
  document.getElementById('mem-email').value   = m.email || '';
  document.getElementById('mem-role').value    = m.role  || '家長';
  document.getElementById('mem-no').value    = m.memberNo || '';
  document.getElementById('mem-birth').value = m.birthDate ? m.birthDate.replace(/\//g, '-') : '';
  document.getElementById('mem-join').value  = m.joinDate ? m.joinDate.replace(/\//g, '-') : '';
  setSelectValue('mem-family',   m.familyId);
  setSelectValue('mem-gender',   m.gender);
  setSelectValue('mem-troop',    m.troop);
  setSelectValue('mem-grade',    m.grade);
  setSelectValue('mem-position', m.position);
  setSelectValue('mem-squad',    m.squad);
  document.getElementById('mem-remark').value = m.remark || '';
  openModal('modal-member');
}

function saveMember() {
  var name = document.getElementById('mem-name').value.trim();
  var fid  = document.getElementById('mem-family').value;
  if (!name) { toast('請填寫姓名', 'error'); return; }
  if (!fid)  { toast('請選擇家庭', 'error'); return; }
  var fam = findById(S.families, fid);

  var data = {
    id:          document.getElementById('mem-id').value.trim() || null,
    familyId:    fid,
    familyName:  fam ? fam.name : '',
    name:        name,
    naturalName: document.getElementById('mem-natural').value,
    gender:      document.getElementById('mem-gender').value,
    role:        document.getElementById('mem-role').value,
    phone:       document.getElementById('mem-phone').value,
    email:       document.getElementById('mem-email').value,
    troop:       document.getElementById('mem-troop').value,
    grade:       document.getElementById('mem-grade').value,
    position:    document.getElementById('mem-position').value,
    squad:       document.getElementById('mem-squad').value,
    memberNo:    document.getElementById('mem-no').value,
    birthDate:   document.getElementById('mem-birth').value.replace(/-/g, '/'),
    joinDate:    document.getElementById('mem-join').value.replace(/-/g, '/'),
    remark:      document.getElementById('mem-remark').value
  };

  // ★ 防連點機制：鎖定按鈕並更改文字
  var btn = document.getElementById('mem-save-btn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '儲存中...';
  }

  gas('saveMember', data).then(function() {
    toast('儲存成功', 'success');
    closeModal('modal-member');
    loadAdminData();
  }).catch(function(e){ 
    toast('儲存失敗', 'error'); 
  }).finally(function() {
    // ★ 無論成功或失敗，最後都將按鈕恢復原狀
    if (btn) {
      btn.disabled = false;
      btn.textContent = '儲存';
    }
  });
}

function deleteMemberById(mid) {
  var m = findById(S.members, mid);
  if (!confirm('確定要刪除成員[' + (m ? m.name : mid) + ']？')) return;
  gas('deleteMember', mid).then(function() {
    toast('已刪除', 'success');
    loadAdminData();
  }).catch(function(){ toast('刪除失敗', 'error'); });
}

// ── 家庭管理 ──────────────────────────────────────────────────────

function renderFamiliesList() {
  var el = document.getElementById('families-list');
  document.getElementById('family-count').textContent = '共 ' + S.families.length + ' 個家庭';
  if (!S.families.length) { el.innerHTML = '<div class="empty">尚無家庭</div>'; return; }

  el.innerHTML = S.families.map(function(f) {
    var fMembers = S.members.filter(function(m){ return String(m.familyId) === String(f.id); });
    return '<div class="mem-card">' +
      '<div style="flex:1">' +
        '<div style="font-weight:700;margin-bottom:6px">' + (f.no ? '['+f.no+'] ' : '') + esc(f.name) + '</div>' +
        '<div style="display:flex;flex-wrap:wrap;gap:5px">' +
          fMembers.map(function(m){ return '<span class="tag">' + esc(m.naturalName || m.name) + ' (' + (m.role||'') + ')</span>'; }).join('') +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:6px;flex-shrink:0">' +
        '<button class="btn btn-outline btn-xs" data-fid="' + f.id + '" onclick="editFamilyById(this.getAttribute(\'data-fid\'))">編輯</button>' +
        '<button class="btn btn-danger btn-xs" data-fid="' + f.id + '" onclick="deleteFamilyById(this.getAttribute(\'data-fid\'))">刪除</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openFamilyModal() {
  document.getElementById('modal-family-title').textContent = '新增家庭';
  document.getElementById('fam-id').value   = '';
  document.getElementById('fam-name').value = '';
  openModal('modal-family');
}

function editFamilyById(fid) {
  var f = findById(S.families, fid);
  if (!f) return;
  document.getElementById('modal-family-title').textContent = '編輯家庭';
  document.getElementById('fam-id').value   = f.id;
  document.getElementById('fam-name').value = f.name;
  openModal('modal-family');
}

function saveFamily() {
  var name = document.getElementById('fam-name').value.trim();
  if (!name) { toast('請填寫家庭名稱', 'error'); return; }
  var data = { id: document.getElementById('fam-id').value.trim() || null, name: name };
  
  // ★ 防連點：鎖定家庭儲存按鈕
  var btn = document.getElementById('fam-save-btn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '儲存中...';
  }

  gas('saveFamily', data).then(function() {
    toast('儲存成功', 'success');
    closeModal('modal-family');
    loadAdminData();
  }).catch(function(){ 
    toast('儲存失敗', 'error'); 
  }).finally(function() {
    // ★ 恢復按鈕狀態
    if (btn) {
      btn.disabled = false;
      btn.textContent = '儲存';
    }
  });
}

function deleteFamilyById(fid) {
  var f = findById(S.families, fid);
  if (!confirm('確定要刪除家庭[' + (f ? f.name : fid) + ']？')) return;
  gas('deleteFamily', fid).then(function() {
    toast('已刪除', 'success');
    loadAdminData();
  }).catch(function(){ toast('刪除失敗', 'error'); });
}

// ── 活動管理 ──────────────────────────────────────────────────────

function renderActivitiesAdminList() {
  var el = document.getElementById('activities-admin-list');
  if (!S.activities.length) { el.innerHTML = '<div class="empty">尚無活動</div>'; return; }

  el.innerHTML = S.activities.map(function(a) {
    return '<div class="act-card" style="cursor:default">' +
      '<div style="flex:1">' +
        '<div class="act-name">' + esc(a.name) +
          (a.countStat ? ' <span style="font-size:13px;background:var(--forest);color:#fff;border-radius:4px;padding:1px 7px;vertical-align:middle;margin-left:6px">📈 統計</span>' : '') +
        '</div>' +
        '<div class="act-meta">' +
          (a.startDate ? '<span>開始 '     + a.startDate + '</span>' : '') +
          (a.endDate   ? '<span>結束 '     + a.endDate   + '</span>' : '') +
          (a.openDate  ? '<span>開放報名 ' + a.openDate  + '</span>' : '') +
          (a.deadline  ? '<span>截止報名 ' + a.deadline  + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">' +
        '<span class="badge ' + (a.isOpen ? 'badge-open' : 'badge-closed') + '">' + a.status + '</span>' +
        '<div style="display:flex;gap:6px">' +
          '<button class="btn btn-outline btn-xs" data-aid="' + a.id + '" onclick="editActivityById(this.getAttribute(\'data-aid\'))">編輯</button>' +
          '<button class="btn btn-danger btn-xs"  data-aid="' + a.id + '" onclick="deleteActivityById(this.getAttribute(\'data-aid\'))">刪除</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openActivityModal() {
  document.getElementById('modal-activity-title').textContent = '新增活動';
  document.getElementById('act-id').value       = '';
  document.getElementById('act-name').value     = '';
  document.getElementById('act-start').value    = '';
  document.getElementById('act-end').value      = '';
  document.getElementById('act-opendate').value = '';
  document.getElementById('act-deadline').value = '';
  document.getElementById('act-countstat').checked = false;
  openModal('modal-activity');
}

function editActivityById(aid) {
  var a = findById(S.activities, aid);
  if (!a) return;
  document.getElementById('modal-activity-title').textContent = '編輯活動';
  document.getElementById('act-id').value       = a.id;
  document.getElementById('act-name').value     = a.name;
  document.getElementById('act-start').value    = a.startDate ? a.startDate.split('/').join('-') : '';
  document.getElementById('act-end').value      = a.endDate   ? a.endDate.split('/').join('-')   : '';
  document.getElementById('act-opendate').value = a.openDate  ? a.openDate.split('/').join('-')  : '';
  document.getElementById('act-deadline').value = a.deadline  ? a.deadline.split('/').join('-')  : '';
  document.getElementById('act-countstat').checked = !!a.countStat;
  openModal('modal-activity');
}

function saveActivity() {
  var name = document.getElementById('act-name').value.trim();
  if (!name) { toast('請填寫活動名稱', 'error'); return; }

  var data = {
    id:        document.getElementById('act-id').value.trim() || null,
    name:      name,
    startDate: document.getElementById('act-start').value,
    endDate:   document.getElementById('act-end').value,
    openDate:  document.getElementById('act-opendate').value,
    deadline:  document.getElementById('act-deadline').value,
    countStat: document.getElementById('act-countstat').checked
    // ★ 不再傳 status
  };

  var btn = document.getElementById('act-save-btn');
  if (btn) { btn.disabled = true; btn.textContent = '儲存中...'; }

  gas('saveActivity', data).then(function() {
    toast('儲存成功', 'success');
    closeModal('modal-activity');
    loadAdminData();
    if (typeof renderActivityListRsvp === 'function') renderActivityListRsvp();
  }).catch(function(){
    toast('儲存失敗', 'error');
  }).finally(function() {
    if (btn) { btn.disabled = false; btn.textContent = '儲存'; }
  });
}

function deleteActivityById(aid) {
  var a = findById(S.activities, aid);
  if (!confirm('確定要刪除活動[' + (a ? a.name : aid) + ']？將同步刪除報名資料！')) return;
  gas('deleteActivity', aid).then(function() {
    toast('已刪除', 'success');
    loadAdminData();
    if(typeof renderActivityListRsvp === 'function') renderActivityListRsvp();
  }).catch(function(){ toast('刪除失敗', 'error'); });
}

// ── 名冊與升級 ────────────────────────────────────────────────────

// ────────────────────────────────────────────────────────────────
// [A] 完整版 loadRoster()
//
// 修改重點：
//  1. 新增模式切換按鈕（簡易 / 完整）
//  2. 簡易模式：原本的 9 欄
//  3. 完整模式：全欄（扣掉 id / familyId）
//     → 家庭、姓名、自然名、角色、性別、電話、Email、
//       團別、年級、職位、小隊、會員編號、生日、入團日、個人備註
//  4. 兩種模式都有：sticky 表頭、水平捲軸
// ────────────────────────────────────────────────────────────────

// 名冊模式狀態（'simple' | 'full'）
var rosterMode = 'simple';

function setRosterMode(mode) {
  rosterMode = mode;
  document.querySelectorAll('#roster-mode-ctrl .seg-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
  renderRosterContent();
}

function loadRoster() {
  var troop = document.getElementById('roster-troop').value;
  var squad = document.getElementById('roster-squad').value;
  var el = document.getElementById('roster-content');

  if (!troop && !squad) {
    el.innerHTML = '<div class="empty">請選擇團別或小隊</div>';
    return;
  }

  var filtered = S.members.filter(function(m) {
    if (m.position === '離團') return false;
    if (troop && m.troop !== troop) return false;
    if (squad && m.squad !== squad) return false;
    return true;
  });

  // 把篩選結果暫存，供模式切換時直接使用
  S._rosterFiltered = filtered;

  // 插入模式切換按鈕（只產生一次）
  if (!document.getElementById('roster-mode-ctrl')) {
    var ctrl = document.createElement('div');
    ctrl.id = 'roster-mode-ctrl';
    ctrl.className = 'seg-ctrl';
    ctrl.style.cssText = 'margin-bottom:12px;display:flex;';
    ctrl.innerHTML =
      '<button class="seg-btn active" data-mode="simple" onclick="setRosterMode(\'simple\')">簡易欄位</button>' +
      '<button class="seg-btn" data-mode="full" onclick="setRosterMode(\'full\')">完整欄位</button>';
    el.parentNode.insertBefore(ctrl, el);

// ── Excel 匯入功能 ────────────────────────────────────────────────

var importData = [];

function openImportModal() {
  document.getElementById('import-step-upload').style.display = 'block';
  document.getElementById('import-step-preview').style.display = 'none';
  document.getElementById('import-step-progress').style.display = 'none';
  document.getElementById('import-step-done').style.display = 'none';
  document.getElementById('import-parse-status').textContent = '';
  importData = [];
  openModal('modal-import');
}

function resetImport() { openImportModal(); }
function closeImportModal() { closeModal('modal-import'); }

function handleImportDrop(e) {
  e.preventDefault();
  e.currentTarget.style.background = 'var(--cream)';
  if (e.dataTransfer.files && e.dataTransfer.files[0]) handleImportFile(e.dataTransfer.files[0]);
}

function handleImportFile(file) {
  if (!file) return;
  var statusEl = document.getElementById('import-parse-status');
  statusEl.textContent = '讀取檔案中...';
  
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      // ★ 修改 1：加入 cellDates: true，讓 Excel 將日期轉為標準 JavaScript Date 物件
      var workbook = XLSX.read(data, {type: 'array', cellDates: true});
      var sheetName = workbook.SheetNames[0];
      var worksheet = workbook.Sheets[sheetName];
      // ★ 修改 2：使用 raw: true，將未加工的日期交給我們自己處理
      var json = XLSX.utils.sheet_to_json(worksheet, {header: 1, raw: true}); 
      parseImportData(json);
    } catch(err) {
      statusEl.innerHTML = '<span style="color:var(--red)">檔案解析失敗，請確認是否為有效的 Excel 檔。</span>';
    }
  };
  reader.readAsArrayBuffer(file);
}


// ──────────────────────────────────────────────────────────────
// [2] parseImportData() — 正確版
//
// Excel 結構：
//   rows[0]（第1列）= 欄位標題  → 用來建立 colMap
//   rows[1]（第2列）= 說明列    → 跳過 ★
//   rows[2]（第3列）起          = 實際資料，從 i=2 開始 ★
//
// 欄位比對：normalize() 去除空白+BOM，aliasMap 支援多種名稱
//   「備註」= 此 Excel 的欄位名稱，對應到「個人備註」
// ──────────────────────────────────────────────────────────────
function parseImportData(rows) {
  if (!rows || rows.length < 3) {
    document.getElementById('import-parse-status').innerHTML =
      '<span style="color:var(--red)">檔案內容為空或格式錯誤</span>';
    return;
  }

  // normalize：去 BOM + 壓縮空白 + 小寫
  function normalize(s) {
    return String(s || '')
      .replace(/^\uFEFF/, '')
      .replace(/[\u3000\s]+/g, '')
      .toLowerCase();
  }

  // 欄位別名對照（支援「備註」= 此 Excel 的欄位名）
  var aliasMap = {
    '家庭名稱':   ['家庭名稱', '家庭'],
    '姓名':       ['姓名', 'name'],
    '自然名':     ['自然名', 'naturalname'],
    '角色':       ['角色', 'role'],
    '性別':       ['性別', 'gender'],
    '電話':       ['電話', 'phone', 'tel'],
    'Email':      ['email', 'e-mail', '電子郵件', 'mail'],
    '團別':       ['團別', 'troop'],
    '年級':       ['年級', 'grade'],
    '職位':       ['職位', 'position'],
    '隊名':       ['隊名', 'squad', '小隊'],
    '會員編號':   ['會員編號', 'memberno', '編號'],
    '出生年月日': ['出生年月日', '出生日期', 'birthday', 'birthdate'],
    '入團日期':   ['入團日期', '入團', 'joindate'],
    '個人備註':   ['個人備註', '備註', 'note', 'remark', 'memo']  // ★「備註」在這裡
  };

  // 從第1列（rows[0]）建立 colMap
  var rawHeaders = rows[0].map(function(h){ return String(h || ''); });
  var colMap = {};

  Object.keys(aliasMap).forEach(function(stdKey) {
    var aliases = aliasMap[stdKey].map(normalize);
    rawHeaders.forEach(function(h, idx) {
      if (aliases.indexOf(normalize(h)) >= 0) {
        colMap[stdKey] = idx;
      }
    });
  });

  // 偵錯（打開 F12 Console 可以看到）
  console.log('[匯入] 原始欄位：', rawHeaders);
  console.log('[匯入] colMap：', colMap);

  if (!('家庭名稱' in colMap) || !('姓名' in colMap) || !('角色' in colMap)) {
    document.getElementById('import-parse-status').innerHTML =
      '<span style="color:var(--red)">缺少必填欄位：家庭名稱、姓名、角色<br>' +
      '<small>偵測到的欄位：' + rawHeaders.join('、') + '</small></span>';
    return;
  }

  importData = [];
  var errs = [];

  // ★ 從 i=2 開始（跳過 rows[0] 標題列 + rows[1] 說明列）
  for (var i = 2; i < rows.length; i++) {
    var r = rows[i];
    if (!r || !r.length) continue;

    // 跳過完全空白的列
    var nameVal = (colMap['姓名'] !== undefined) ? r[colMap['姓名']] : '';
    if (nameVal === null || nameVal === undefined || String(nameVal).trim() === '') continue;

    var item = { rowNum: i + 1 };

    Object.keys(colMap).forEach(function(k) {
      var val = r[colMap[k]];
      if (val instanceof Date) {
        var yyyy = val.getFullYear();
        var mm   = String(val.getMonth() + 1).padStart(2, '0');
        var dd   = String(val.getDate()).padStart(2, '0');
        item[k] = yyyy + '/' + mm + '/' + dd;
      } else {
        item[k] = (val !== null && val !== undefined) ? String(val).trim() : '';
      }
    });

    var stat = 'OK';
    if (!item['家庭名稱']) { stat = '缺家庭'; errs.push('第 ' + item.rowNum + ' 列：缺少家庭名稱'); }
    else if (!item['角色']) { stat = '缺角色';  errs.push('第 ' + item.rowNum + ' 列：缺少角色'); }
    item.status = stat;
    importData.push(item);
  }

  if (errs.length > 0) {
    var errEl = document.getElementById('import-error-list');
    errEl.style.display = 'block';
    errEl.innerHTML = '<strong>發現錯誤：</strong><br>' +
      errs.slice(0, 5).join('<br>') +
      (errs.length > 5 ? '<br>...等共 ' + errs.length + ' 個錯誤' : '');
    document.getElementById('import-confirm-btn').disabled = true;
  } else {
    document.getElementById('import-error-list').style.display = 'none';
    document.getElementById('import-confirm-btn').disabled = false;
  }

  document.getElementById('import-summary').innerHTML =
    '<span class="badge badge-troop">共讀取 ' + importData.length + ' 筆</span>' +
    (errs.length
      ? '<span class="badge" style="background:#fce8e6;color:var(--red)">' + errs.length + ' 筆錯誤</span>'
      : '<span class="badge badge-attend">格式檢查通過</span>');

  var tbody = document.getElementById('import-preview-body');
  tbody.innerHTML = importData.slice(0, 50).map(function(d, idx) {
    var stClr = d.status === 'OK' ? 'color:var(--forest)' : 'color:var(--red);font-weight:700';
    return '<tr>' +
      '<td class="td-sm">'  + (idx + 1)                   + '</td>' +
      '<td>' + esc(d['家庭名稱']   || '') + '</td>' +
      '<td>' + esc(d['姓名']       || '') + '</td>' +
      '<td>' + esc(d['自然名']     || '') + '</td>' +
      '<td>' + esc(d['角色']       || '') + '</td>' +
      '<td>' + esc(d['性別']       || '') + '</td>' +
      '<td>' + esc(d['團別']       || '') + '</td>' +
      '<td>' + esc(d['年級']       || '') + '</td>' +
      '<td>' + esc(d['職位']       || '') + '</td>' +
      '<td>' + esc(d['隊名']       || '') + '</td>' +
      '<td>' + esc(d['會員編號']   || '') + '</td>' +
      '<td>' + esc(d['出生年月日'] || '') + '</td>' +
      '<td>' + esc(d['入團日期']   || '') + '</td>' +
      '<td>' + esc(d['個人備註']   || '') + '</td>' +
      '<td style="' + stClr + '">' + d.status + '</td>' +
      '</tr>';
  }).join('');

  document.getElementById('import-step-upload').style.display = 'none';
  document.getElementById('import-step-preview').style.display = 'block';
}


// ──────────────────────────────────────────────────────────────
// confirmImport() — 傳遞個人備註到後端
// ──────────────────────────────────────────────────────────────
function confirmImport() {
  if (!importData.length) return;

  document.getElementById('import-step-preview').style.display = 'none';
  document.getElementById('import-step-progress').style.display = 'block';

  var total = importData.length, current = 0, successCount = 0;
  var progBar  = document.getElementById('import-progress-bar');
  var progText = document.getElementById('import-progress-text');
  var famMap = {};
  S.families.forEach(function(f){ famMap[f.name] = f.id; });

  function processNext() {
    if (current >= total) {
      document.getElementById('import-step-progress').style.display = 'none';
      document.getElementById('import-step-done').style.display = 'block';
      document.getElementById('import-done-msg').textContent = '匯入完成！';
      document.getElementById('import-done-sub').textContent =
        '成功新增了 ' + successCount + ' 筆資料。';
      loadAdminData();
      return;
    }

    var d = importData[current];
    var fname = d['家庭名稱'];

    var ensureFamily = function() {
      if (famMap[fname]) return Promise.resolve(famMap[fname]);
      return gas('saveFamily', { name: fname }).then(function(res) {
        famMap[fname] = res.id;
        return res.id;
      });
    };

    ensureFamily().then(function(fid) {
      return gas('saveMember', {
        familyId:    fid,
        familyName:  d['家庭名稱']   || '',
        name:        d['姓名']       || '',
        naturalName: d['自然名']     || '',
        role:        d['角色']       || '',
        gender:      d['性別']       || '',
        phone:       d['電話']       || '',
        email:       d['Email']      || '',
        troop:       d['團別']       || '',
        grade:       d['年級']       || '',
        position:    d['職位']       || '',
        squad:       d['隊名']       || '',
        memberNo:    d['會員編號']   || '',
        birthDate:   d['出生年月日'] || '',
        joinDate:    d['入團日期']   || '',
        note:        d['個人備註']   || ''
      });
    }).then(function() {
      successCount++;
      current++;
      updateProgress();
      processNext();
    }).catch(function(e) {
      console.error('匯入失敗:', e);
      current++;
      updateProgress();
      processNext();
    });
  }

  function updateProgress() {
    var pct = Math.round((current / total) * 100);
    progBar.style.width = pct + '%';
    progText.textContent = '匯入中：' + current + ' / ' + total + ' (' + pct + '%)';
  }

  updateProgress();
  processNext();
}





// ── 出缺席統計 ──────────────────────────────────────────────────

var _attendStatData = null; // 快取最後一次查詢結果，供匯出使用

function loadAttendStat() {
  var pos = document.getElementById('attendstat-pos').value;
  var el  = document.getElementById('attendstat-content');
  el.innerHTML = '<div class="loading"></div>';

  gas('getAttendanceStat', pos).then(function(res) {
    _attendStatData = res;
    renderAttendStat(res);
  }).catch(function() {
    el.innerHTML = '<div class="empty">載入失敗，請重試</div>';
  });
}

function renderAttendStat(res) {
  var el = document.getElementById('attendstat-content');

  if (!res || !res.activities || !res.activities.length) {
    el.innerHTML = '<div class="empty">目前沒有「納入統計」的活動，請先在活動管理中勾選「納入出缺席統計」</div>';
    return;
  }
  if (!res.rows || !res.rows.length) {
    el.innerHTML = '<div class="empty">查無符合條件的成員</div>';
    return;
  }

  var acts = res.activities;
  var rows = res.rows;

  // ── 表頭
  var thActs = acts.map(function(a) {
    return '<th style="min-width:70px;text-align:center;font-size:12px;padding:4px 6px">' +
      esc(a.name) + (a.startDate ? '<br><span style="font-weight:400;opacity:.75">' + a.startDate + '</span>' : '') +
    '</th>';
  }).join('');

  var thead =
    '<tr>' +
      '<th style="min-width:70px">姓名</th>' +
      '<th style="min-width:60px">職位</th>' +
      '<th style="min-width:50px">團別</th>' +
      thActs +
      '<th style="text-align:center">出席</th>' +
      '<th style="text-align:center">缺席</th>' +
      '<th style="text-align:center">待確認</th>' +
      '<th style="text-align:center">未報名</th>' +
      '<th style="text-align:center">出席率</th>' +
    '</tr>';

  // 狀態對應色彩
  var stColor = {
    '出席':   'background:#d4edda;color:#155724',
    '不出席': 'background:#f8d7da;color:#721c24',
    '待確認': 'background:#fff3cd;color:#856404',
    '未報名': 'background:#e9ecef;color:#6c757d'
  };
  var stLabel = { '出席': '✔', '不出席': '✘', '待確認': '？', '未報名': '—' };

  // ── 資料列
  var tbody = rows.map(function(r) {
    var actCells = r.actStats.map(function(st) {
      var style = stColor[st] || 'background:#e9ecef;color:#6c757d';
      return '<td style="text-align:center;' + style + ';font-weight:600;font-size:14px">' + (stLabel[st] || st) + '</td>';
    }).join('');

    var rateColor = r.attendRate >= 80 ? 'color:var(--forest);font-weight:700'
                  : r.attendRate >= 50 ? 'color:#856404;font-weight:700'
                  : 'color:#721c24;font-weight:700';

    return '<tr>' +
      '<td>' + esc(r.memberName) + '</td>' +
      '<td style="font-size:13px">' + esc(r.position) + '</td>' +
      '<td style="font-size:13px">' + esc(r.troop) + '</td>' +
      actCells +
      '<td style="text-align:center;font-weight:600">' + r.attend  + '</td>' +
      '<td style="text-align:center">'                 + r.absent  + '</td>' +
      '<td style="text-align:center">'                 + r.pending + '</td>' +
      '<td style="text-align:center">'                 + r.noRsvp  + '</td>' +
      '<td style="text-align:center;' + rateColor + '">' + r.attendRate + '%</td>' +
    '</tr>';
  }).join('');

  // ── 圖例
  var legend =
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:13px">' +
      Object.keys(stColor).map(function(k) {
        return '<span style="padding:2px 10px;border-radius:4px;' + stColor[k] + '">' + stLabel[k] + ' ' + k + '</span>';
      }).join('') +
      '<span style="padding:2px 10px;border-radius:4px;background:#f0f0f0;color:#333">共 ' + acts.length + ' 項活動 · ' + rows.length + ' 位成員</span>' +
    '</div>';

  el.innerHTML = legend +
    '<div style="overflow-x:auto">' +
      '<table class="data-table" style="min-width:100%;border-collapse:collapse;font-size:14px">' +
        '<thead>' + thead + '</thead>' +
        '<tbody>' + tbody + '</tbody>' +
      '</table>' +
    '</div>';
}

function exportAttendStat() {
  if (!_attendStatData || !_attendStatData.rows || !_attendStatData.rows.length) {
    toast('請先查詢統計資料', 'error'); return;
  }
  var res  = _attendStatData;
  var acts = res.activities;
  var rows = res.rows;

  var header = ['姓名', '職位', '團別', '隊名'].concat(
    acts.map(function(a){ return a.name + (a.startDate ? '(' + a.startDate + ')' : ''); })
  ).concat(['出席次數', '缺席次數', '待確認', '未報名', '出席率(%)']);

  var data = [header].concat(rows.map(function(r) {
    return [r.memberName, r.position, r.troop, r.squad || ''].concat(r.actStats).concat([r.attend, r.absent, r.pending, r.noRsvp, r.attendRate]);
  }));

  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, '出缺席統計');
  XLSX.writeFile(wb, '出缺席統計.xlsx');
}
