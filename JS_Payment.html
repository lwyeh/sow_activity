<script>
// ================================================================
//  JS_Payment.html - 全功能終極完整版 (含動態繳費方式選單)
// ================================================================

var _payCurrentFamilyId = '';
var _payCurrentFamilyName = '';
var _currentSummaries = []; 

// ── 系統共用：自訂確認對話框引擎 ──
var _confirmCallback = null;
function showCustomConfirm(msg, callback) {
  document.getElementById('custom-confirm-msg').innerHTML = msg;
  _confirmCallback = callback;
  openModal('modal-custom-confirm');
}
function executeCustomConfirm() {
  closeModal('modal-custom-confirm');
  if (typeof _confirmCallback === 'function') {
    _confirmCallback();
    _confirmCallback = null; // 執行完後清空
  }
}

function initPayPage() {
  var inp = document.getElementById('pay-family-search');
  if (inp) inp.value = '';
  var list = document.getElementById('pay-family-list');
  if (list) list.innerHTML = '';
  var sec = document.getElementById('pay-items-section');
  if (sec) sec.style.display = 'none';
  _payCurrentFamilyId = '';
  _payCurrentFamilyName = '';
  _currentSummaries = [];
}

function filterPayFamilies() {
  var q    = (document.getElementById('pay-family-search').value || '').toLowerCase().trim();
  var list = document.getElementById('pay-family-list');
  if (!q) { list.innerHTML = ''; return; }
  var html = '';
  S.families.forEach(function(f) {
    var match = f.name.toLowerCase().indexOf(q) >= 0 || (f.no && f.no.indexOf(q) >= 0);
    if (!match) return;
    html += '<div class="member-row" style="cursor:pointer;margin-bottom:6px" ' +
      'onclick="selectPayFamily(\'' + f.id + '\',\'' + esc(f.name) + '\')">' +
      '<div style="font-weight:700">' + (f.no ? '[' + f.no + '] ' : '') + esc(f.name) + '</div>' +
      '</div>';
  });
  list.innerHTML = html || '<div class="empty" style="padding:10px">找不到符合的家庭</div>';
}

function selectPayFamily(fid, fname) {
  _payCurrentFamilyId = fid;
  _payCurrentFamilyName = fname;
  document.getElementById('pay-family-search').value = fname;
  document.getElementById('pay-family-list').innerHTML = '';
  document.getElementById('pay-family-title').textContent = '家庭繳費項目：' + fname;
  document.getElementById('pay-items-section').style.display = 'block';
  loadPayItems(fid);
}

function loadPayItems(fid) {
  var el = document.getElementById('pay-items-list');
  el.innerHTML = '<div class="loading"></div>';
  gas('getPaySummaryByFamily', fid).then(function(summaries) {
    _currentSummaries = summaries || [];
    if (!_currentSummaries.length) {
      el.innerHTML = '<div class="empty">目前沒有收費項目</div>';
      return;
    }
    var html = '';
    _currentSummaries.forEach(function(s) {
      var isPaid = false;
      var statusBadge = '';
      var borderColor = '';
      var hasActive = s.records.some(function(r){ return r.status === '已送出'; });

      // 狀態與標籤判斷
      if (s.remaining === 0) {
        isPaid = true;
        statusBadge = '<span class="badge badge-attend">已結清</span>';
        borderColor = 'var(--forest-lt)';
      } else if (s.remaining < 0) {
        statusBadge = '<span class="badge" style="background:var(--amber);color:#fff;padding:4px 8px;border-radius:4px;font-size:16px;">待退費</span>';
        borderColor = 'var(--amber)';
      } else {
        if (hasActive) {
          statusBadge = '<span class="badge badge-pending">待確認</span>';
          borderColor = 'var(--amber)';
        } else {
          statusBadge = '<span class="badge badge-absent">未結清</span>';
          borderColor = 'var(--red)';
        }
      }

      html += '<div class="card" style="margin-bottom:14px;border-left:4px solid ' + borderColor + '">';

      // 標題列 (已移除前端的調整明細按鈕)
      html += '<div class="flex-between" style="margin-bottom:10px">' +
        '<div>' +
          '<div style="font-weight:700;font-size:27px">' + esc(s.actName) + '</div>' +
          '<div style="font-size:22px;color:var(--ink-soft);margin-top:3px">' +
            '應繳：<strong style="color:var(--ink)">$' + s.totalAmount + '</strong>　' +
            '已繳：<strong style="color:var(--forest-lt)">$' + s.paidTotal + '</strong>　' +
            (s.remaining < 0 ? 
              '待退：<strong style="color:var(--amber)">$' + Math.abs(s.remaining) + '</strong>' :
              '未繳：<strong style="color:var(--red)">$' + Math.max(0, s.remaining) + '</strong>') +
          '</div>' +
        '</div>' +
        '<div>' + statusBadge + '</div>' +
      '</div>';

      // 顯示繳費說明
      if (s.actNote) {
        html += '<div style="background:var(--cream); border:1px dashed var(--forest-lt); border-radius:6px; padding:10px; margin-bottom:10px; font-size:18px; color:var(--forest-md); line-height:1.6;">' +
                '<strong style="color:var(--forest);">💡 繳費說明：</strong><br>' + esc(s.actNote).replace(/\n/g, '<br>') +
                '</div>';
      }

      // 明細列表 (自然名優先)
      if (s.details && s.details.length) {
        html += '<details style="margin-bottom:10px"><summary style="cursor:pointer;font-size:22px;color:var(--forest-lt)">查看明細（' + s.details.length + ' 項）</summary>';
        html += '<div style="margin-top:8px;background:var(--mist);border-radius:6px;padding:8px">';
        s.details.forEach(function(d) {
          var dispName = d.naturalName || d.memberName;
          html += '<div style="display:flex;justify-content:space-between;font-size:20px;padding:3px 0;border-bottom:1px solid var(--line)">' +
            '<span>' + esc(dispName) + ' : ' + esc(d.equipName) + ' x' + d.qty + '</span>' +
            '<span style="color:var(--forest-md)">$' + d.subtotal + '</span>' +
          '</div>';
        });
        html += '</div></details>';
      }

      // 歷史繳費紀錄
      if (s.records && s.records.length) {
        html += '<div style="background:var(--mist);border-radius:6px;padding:8px;margin-bottom:10px">' +
          '<div style="font-size:20px;font-weight:700;color:var(--ink-soft);margin-bottom:4px">繳費紀錄</div>';
        s.records.forEach(function(r) {
          var sc = r.status === '已確認' ? 'color:var(--forest-lt)' : r.status === '已退回' ? 'color:var(--red)' : 'color:var(--amber)';
          html += '<div style="display:flex;justify-content:space-between;font-size:20px;margin-bottom:4px">' +
            '<span>' + esc(r.submitAt) + ' ' + esc(r.method) + ' $' + r.amount + (r.note?' ('+esc(r.note)+')':'') + '</span>' +
            '<span style="font-weight:700;' + sc + '">' + r.status + '</span>' +
          '</div>';
          if (r.rejectNote) html += '<div style="color:var(--red);font-size:18px;margin-bottom:4px">退回原因：' + esc(r.rejectNote) + '</div>';
        });
        html += '</div>';
      }

      // ── 操作按鈕區（依 isOpen 判斷是否可操作）──
      var pendingTotal = 0;
      s.records.forEach(function(r) {
        if (r.status === '已送出' || r.status === '待確認') pendingTotal += r.amount;
      });
      var realRemaining = Math.max(0, s.remaining - pendingTotal);

      // ★ 加入日期狀態說明文字
      if (s.actStatus && s.actStatus !== '開放報名') {
        var statusNote = s.actStatus === '已結束' ? '⛔ 已截止，無法填選' : '🕐 尚未開放填選';
        html += '<div style="text-align:right;font-size:22px;color:var(--ink-soft);margin-top:6px">' + statusNote + '</div>';
      }

      // ★ 只有開放中才顯示操作按鈕
      if (s.isOpen) {
        html += '<div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:4px">';

        if (String(s.actType || '').trim().toLowerCase() === 'type1') {
          var searchInput = document.getElementById('pay-family-search');
          var currentSearchName = searchInput ? searchInput.value.trim() : '';
          var famMembers = (S.members || []).filter(function(m) {
            var idMatch   = String(m.familyId || '').trim() === String(fid || '').trim();
            var nameMatch = String(m.familyName || '').trim() === currentSearchName;
            return (idMatch || nameMatch) && (m.position || '') !== '離團';
          });

          if (famMembers.length > 0) {
            famMembers.forEach(function(m) {
              var dispName = m.naturalName || m.name || '成員';
              html += '<button class="btn btn-outline btn-xs" ' +
                'onclick="openType1Selection(\'' + s.actId + '\',\'' + esc(s.actName) + '\',\'' + fid + '\',\'' + m.id + '\', this)">' +
                esc(dispName) + '：選設備</button>';
            });
          } else {
            html += '<button class="btn btn-outline btn-xs" style="color:var(--red);border-color:var(--red)" ' +
              'onclick="openType1Selection(\'' + s.actId + '\',\'' + esc(s.actName) + '\',\'' + fid + '\',\'\', this)">管理設備項目</button>';
          }
        }

        if (realRemaining > 0) {
          html += '<button class="btn btn-primary btn-sm" ' +
            'onclick="openPaySubmit(\'' + s.actId + '\',\'' + esc(s.actName) + '\',' + realRemaining + ',\'' + fid + '\')">回報繳費</button>';
        }

        if (s.remaining < 0 && S.adminAuth) {
          html += '<button class="btn btn-green btn-sm" onclick="adminDirectRefund(\'' + s.actId + '\',\'' + fid + '\',' + s.remaining + ')">紀錄已退款</button>';
        }

        html += '</div>';
      }

      html += '</div>';
    });
    el.innerHTML = html;
  }).catch(function(e) {
    console.error(e);
    el.innerHTML = '<div class="empty">載入失敗</div>';
  });
}

function openPaySubmit(actId, actName, remaining, familyId) {
  var noteHtml = '';
  var s = _currentSummaries.filter(function(x){ return x.actId === actId; })[0];
  
  if (s && s.actNote) {
     noteHtml = '<div style="margin-top:10px; padding-top:10px; border-top:1px dashed #ccc; color:var(--forest); font-size:18px;"><strong style="color:var(--forest);">💡 繳費說明：</strong><br>' + esc(s.actNote).replace(/\n/g, '<br>') + '</div>';
  }

  document.getElementById('paysubmit-actid').value    = actId;
  document.getElementById('paysubmit-familyid').value = familyId;
  document.getElementById('paysubmit-amount').value   = remaining;
  document.getElementById('paysubmit-note').value     = '';
  document.getElementById('paysubmit-info').innerHTML = '<strong>活動：</strong>' + actName + '<br><strong>未繳金額：</strong>$' + remaining + noteHtml;
  
  // ★ 動態載入該活動允許的繳費方式
  var allowedMethods = (s && s.actMethods && s.actMethods.length > 0) ? s.actMethods : ['現金','LinePay','iPassMoney','轉帳','其他'];
  var methodSel = document.getElementById('paysubmit-method');
  methodSel.innerHTML = '';
  allowedMethods.forEach(function(m) {
    methodSel.innerHTML += '<option value="' + m + '">' + m + '</option>';
  });

  var btn = document.getElementById('paysubmit-btn');
  btn.disabled = false; btn.textContent = '送出繳費';
  openModal('modal-paysubmit');
}

function submitPayRecord() {
  var amount = parseInt(document.getElementById('paysubmit-amount').value, 10);
  if (!amount || amount <= 0) { toast('請輸入正確金額', 'warn'); return; }
  var btn = document.getElementById('paysubmit-btn');
  if (btn.disabled) return;
  btn.disabled = true; btn.textContent = '處理中...';

  var data = {
    actId: document.getElementById('paysubmit-actid').value,
    familyId: document.getElementById('paysubmit-familyid').value,
    amount: amount,
    method: document.getElementById('paysubmit-method').value, // 取得使用者選擇的付款方式
    note: document.getElementById('paysubmit-note').value
  };

  gas('submitPayRecord', data).then(function() {
    toast('繳費回報已送出！', 'success');
    closeModal('modal-paysubmit');
    loadPayItems(data.familyId);
  }).catch(function() {
    toast('送出失敗', 'error');
    btn.disabled = false; btn.textContent = '送出繳費';
  });
}

// ─────────────────────────────────────────────────────────────────
// 2. 管理端 - 收費活動管理
// ─────────────────────────────────────────────────────────────────

var _currentPayActs  = [];
var _editPayActId    = '';
var _editPayActType  = '';    
var _payEquips       = [];
var _type2BatchItems = [];
var _addEquipBusy    = false;

function loadPayActs() {
  var el = document.getElementById('payacts-list');
  el.innerHTML = '<div class="loading"></div>';
  gas('getPayActivities').then(function(acts) {
    _currentPayActs = acts;
    _refreshPayActSelects(acts);

    if (!acts.length) { el.innerHTML = '<div class="empty">沒有收費活動</div>'; return; }
    el.innerHTML = acts.map(function(a) {
      var typeLabel = a.type === 'type1'
        ? '<span class="badge badge-pending" style="font-size:20px">自選設備</span>'
        : '<span class="badge badge-troop"   style="font-size:20px">管理者指定</span>';

      // ★ 新增：狀態 badge（與報名活動一致）
      var statusBadge = a.isOpen
        ? '<span class="badge badge-open"   style="font-size:20px">開放中</span>'
        : (a.status === '已結束'
            ? '<span class="badge badge-closed" style="font-size:20px">已截止</span>'
            : '<span class="badge badge-closed" style="font-size:20px">尚未開放</span>');

      // ★ 日期說明列
      var dateMeta = '';
      if (a.openDate)  dateMeta += '<span style="margin-right:10px">開放 ' + a.openDate + '</span>';
      if (a.deadline)  dateMeta += '<span>截止 ' + a.deadline + '</span>';

      return '<div class="card flex-between" style="margin-bottom:10px">' +
        '<div>' +
          '<div style="font-size:24px;font-weight:700">' + esc(a.name) + '　' + typeLabel + '　' + statusBadge + '</div>' +
          '<div style="font-size:20px;color:var(--ink-soft);margin-top:3px">' +
            '建立：' + a.createdAt +
            (dateMeta ? '　' + dateMeta : '') +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:8px">' +
          '<button class="btn btn-outline btn-sm" onclick="openEditPayAct(\'' + a.id + '\')">管理</button>' +
          '<button class="btn btn-danger btn-sm"  onclick="deletePayAct(\'' + a.id + '\')">刪除</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }).catch(function() { el.innerHTML = '<div class="empty">載入失敗</div>'; });
}

function _refreshPayActSelects(acts) {
  ['payreport-act', 'paycheck-filter-act'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var cur = el.value;
    el.innerHTML = id === 'payreport-act' ? '<option value="">請選擇收費活動</option>' : '<option value="">所有活動</option>';
    acts.forEach(function(a) {
      el.innerHTML += '<option value="' + a.id + '"' + (cur === a.id ? ' selected' : '') + '>' + esc(a.name) + '</option>';
    });
  });
}

function openNewPayActModal() { openModal('modal-payact-type'); }

function choosePayActType(type) {
  closeModal('modal-payact-type');
  _editPayActId = ''; _editPayActType = type; _payEquips = []; _type2BatchItems = [];
  document.getElementById('payact-modal-title').textContent = type === 'type1' ? '新增收費活動（自選設備）' : '新增收費活動（管理者指定）';
  document.getElementById('payact-name').value = ''; 
  document.getElementById('payact-note').value = '';
  document.getElementById('payact-opendate').value = '';
  document.getElementById('payact-deadline').value = '';
  
  // ★ 新增時，預設將所有繳費方式打勾
  var methodCbs = document.querySelectorAll('.payact-method-cb');
  methodCbs.forEach(function(cb) { cb.checked = true; });

  document.getElementById('payact-type1-section').style.display = type === 'type1' ? '' : 'none';
  document.getElementById('payact-type2-section').style.display = type === 'type2' ? '' : 'none';
  
  _renderEquipList(); _renderType2Batch();
  populateType2SingleMembers();

  var btn = document.getElementById('payact-save-btn'); btn.disabled = false; btn.textContent = '儲存活動';
  openModal('modal-payact-edit');
}

function openEditPayAct(actId) {
  var act = null;
  for (var i = 0; i < _currentPayActs.length; i++) { if (_currentPayActs[i].id === actId) { act = _currentPayActs[i]; break; } }
  if (!act) return;
  _editPayActId = actId; _editPayActType = act.type || 'type2'; _type2BatchItems = [];
  document.getElementById('payact-modal-title').textContent = '管理收費活動：' + act.name;
  document.getElementById('payact-name').value = act.name;
  document.getElementById('payact-note').value = act.note || '';
  document.getElementById('payact-opendate').value = act.openDate ? act.openDate.split('/').join('-') : '';
  document.getElementById('payact-deadline').value = act.deadline ? act.deadline.split('/').join('-') : '';

  // ★ 編輯時，根據資料庫設定勾選對應的繳費方式
  var allowedMethods = act.methods || ['現金','LinePay','iPassMoney','轉帳','其他'];
  var methodCbs = document.querySelectorAll('.payact-method-cb');
  methodCbs.forEach(function(cb) { 
    cb.checked = (allowedMethods.indexOf(cb.value) >= 0); 
  });

  document.getElementById('payact-type1-section').style.display = _editPayActType === 'type1' ? '' : 'none';
  document.getElementById('payact-type2-section').style.display = _editPayActType === 'type2' ? '' : 'none';
  var btn = document.getElementById('payact-save-btn'); btn.disabled = false; btn.textContent = '更新活動名稱/說明';
  
  gas('getPayEquips', actId).then(function(equips) {
    _payEquips = equips || []; 
    _renderEquipList(); 
    refreshType2EquipSel(); 
    _renderType2Batch();
    populateType2SingleMembers();
  });
  openModal('modal-payact-edit');
}

function savePayActBasic() {
  var name = document.getElementById('payact-name').value.trim();
  if (!name) { toast('請輸入活動名稱', 'warn'); return; }

  // ★ 收集管理員勾選的繳費方式
  var checkedMethods = [];
  document.querySelectorAll('.payact-method-cb:checked').forEach(function(cb) {
    checkedMethods.push(cb.value);
  });
  if (checkedMethods.length === 0) { toast('請至少勾選一種繳費方式', 'warn'); return; }

  var btn = document.getElementById('payact-save-btn');
  if (btn.disabled) return;
  btn.disabled = true; btn.textContent = '儲存中...';

  gas('savePayActivity', { 
    id: _editPayActId || '', 
    name: name, 
    note: document.getElementById('payact-note').value.trim(), 
    type: _editPayActType,
    methods: checkedMethods, // ★ 傳送給後端儲存
    openDate: document.getElementById('payact-opendate').value,  // ★
    deadline: document.getElementById('payact-deadline').value   // ★
  }).then(function(res) {
    _editPayActId = res.id; toast('活動已儲存，請繼續設定設備', 'success');
    btn.disabled = false; btn.textContent = '更新活動名稱/說明'; loadPayActs();
  }).catch(function() { toast('儲存失敗', 'error'); btn.disabled = false; btn.textContent = '儲存活動'; });
}

function addEquip() {
  if (_addEquipBusy) return;
  var prefix = _editPayActType === 'type1' ? 't1-' : 't2-';
  var ename  = document.getElementById(prefix + 'equip-name').value.trim();
  var eprice = parseInt(document.getElementById(prefix + 'equip-price').value, 10);
  var eqty   = parseInt(document.getElementById(prefix + 'equip-qty').value, 10) || 0;
  var ecat   = _editPayActType === 'type1' ? document.getElementById(prefix + 'equip-category').value : '使用者';

  if (!ename) { toast('請輸入設備名稱', 'warn'); return; }
  if (isNaN(eprice)) { toast('請輸入金額', 'warn'); return; }

  _addEquipBusy = true;
  var addBtn = document.getElementById(prefix + 'equip-add-btn');
  addBtn.disabled = true; addBtn.textContent = '新增中...';

  var ensureActSaved = _editPayActId ? Promise.resolve({ id: _editPayActId }) : (function() {
    var name = document.getElementById('payact-name').value.trim();
    if (!name) { toast('請先填寫活動名稱', 'warn'); return Promise.reject('no name'); }
    
    var checkedMethods = [];
    document.querySelectorAll('.payact-method-cb:checked').forEach(function(cb) { checkedMethods.push(cb.value); });

    return gas('savePayActivity', { id: '', name: name, note: document.getElementById('payact-note').value.trim(), type: _editPayActType, methods: checkedMethods }).then(function(res) {
      _editPayActId = res.id; document.getElementById('payact-save-btn').textContent = '更新活動名稱/說明'; loadPayActs(); return res;
    });
  })();

  ensureActSaved.then(function() {
    return gas('addPayEquip', { actId: _editPayActId, name: ename, price: eprice, maxQty: eqty, category: ecat });
  }).then(function() {
    toast('已新增', 'success');
    document.getElementById(prefix + 'equip-name').value = ''; document.getElementById(prefix + 'equip-price').value = ''; document.getElementById(prefix + 'equip-qty').value = '';
    return gas('getPayEquips', _editPayActId);
  }).then(function(equips) {
    _payEquips = equips || []; _renderEquipList(); refreshType2EquipSel();
  }).catch(function(e) { if (e !== 'no name') toast('新增失敗', 'error'); }).finally(function() {
    _addEquipBusy = false; addBtn.disabled = false; addBtn.textContent = _editPayActType === 'type1' ? '新增設備' : '新增費用項目';
  });
}

// 替換 4：刪除收費設備項目
function deleteEquip(equipId) {
  showCustomConfirm('確定刪除此設備？<br><span style="color:var(--red);font-size:16px;">相關明細也會一併刪除。</span>', function() {
    gas('deletePayEquip', equipId).then(function() {
      toast('已刪除', 'success');
      _payEquips = _payEquips.filter(function(e){ return e.id !== equipId; });
      _renderEquipList(); refreshType2EquipSel();
    }).catch(function() { toast('刪除失敗', 'error'); });
  });
}

function _renderEquipList() {
  var listId = _editPayActType === 'type1' ? 't1-equip-list' : 't2-equip-list';
  var el = document.getElementById(listId);
  if (!el) return;
  if (!_payEquips.length) { el.innerHTML = '<div style="color:var(--ink-soft);font-size:20px;text-align:center;padding:10px">尚無設備</div>'; return; }
  var showCategory = (_editPayActType === 'type1');
  var html = '<div class="tbl-wrap"><table><thead><tr><th>名稱</th><th>金額</th><th>數量上限</th>';

function getReportModeAndFilter() {
  var mode = '家庭';
  var posFilter = '';
  var selects = document.querySelectorAll('select');
  
  for (var i = 0; i < selects.length; i++) {
    var sel = selects[i];
    if (sel.offsetParent === null) continue; 
    if (sel.id === 'payreport-act') continue; 
    
    var text = '';
    if (sel.selectedIndex >= 0) text = sel.options[sel.selectedIndex].text;
    var val = sel.value || '';
    
    if (text.indexOf('個人') >= 0 || val.indexOf('個人') >= 0) {
      mode = '個人';
    } else if (text.indexOf('家庭') >= 0 || val.indexOf('家庭') >= 0) {
      if (mode !== '個人') mode = '家庭';
    } 
    else if (val === '不限' || val === '全部' || text.indexOf('不限') >= 0 || text.indexOf('全部') >= 0) {
      if (!posFilter) posFilter = ''; 
    } 
    else if (['小蟻', '小蜂', '小鹿', '小鷹', '家長', '戶長'].indexOf(val) >= 0) {
      posFilter = val;
    } 
    else if (['小蟻', '小蜂', '小鹿', '小鷹', '家長', '戶長'].indexOf(text) >= 0) {
      posFilter = text;
    }
  }
  return { mode: mode, posFilter: posFilter };
}

function loadPayReport() {
  var actId = document.getElementById('payreport-act').value;
  var el    = document.getElementById('payreport-content');
  if (!actId) { el.innerHTML = '<div class="empty">請先選擇活動</div>'; return; }
  
  var filters = getReportModeAndFilter();
  el.innerHTML = '<div class="loading"></div>';

  Promise.all([
    gas('getPayReport', actId, filters.mode, filters.posFilter),
    gas('getPayReport', actId, '家庭', filters.posFilter) 
  ]).then(function(results) {
    var rows = results[0];    
    var famRows = results[1]; 

    if (!rows || !rows.length) { el.innerHTML = '<div class="empty">此活動無相關收費明細</div>'; return; }
    
    // ★ 加入一個轉換千分位的小工具函式
    function fmtMoney(num) {
      return Number(num || 0).toLocaleString('en-US');
    }

    // ── 1. 計算統計數據 ──
    var stats = {
      '現金': { payable: 0, paid: 0, remaining: 0 },
      'LinePay': { payable: 0, paid: 0, remaining: 0 },
      'iPassMoney': { payable: 0, paid: 0, remaining: 0 },
      '轉帳': { payable: 0, paid: 0, remaining: 0 },
      '其他': { payable: 0, paid: 0, remaining: 0 },
      '尚未回報': { payable: 0, paid: 0, remaining: 0 },
      '全部': { payable: 0, paid: 0, remaining: 0 }
    };

    famRows.forEach(function(fr) {
      var totalAmt = Number(fr.amount) || 0;
      var activeRecs = fr.activeRecords || [];
      var remainingToAllocate = totalAmt;

      if (activeRecs.length === 0) {
        stats['尚未回報'].payable += totalAmt;
        stats['尚未回報'].remaining += totalAmt;
      } else {
        activeRecs.forEach(function(rec) {
          var m = rec.method || '其他';
          if (!stats[m]) m = '其他';
          
          var recAmt = Number(rec.amount) || 0;
          var isPaid = (rec.status === '已確認');

          var allocPayable = Math.min(recAmt, remainingToAllocate);
          if (allocPayable < 0) allocPayable = 0; 

          stats[m].payable += allocPayable;
          stats[m].paid += (isPaid ? recAmt : 0);
          stats[m].remaining += (allocPayable - (isPaid ? recAmt : 0));
          
          remainingToAllocate -= allocPayable;
        });

        if (remainingToAllocate > 0) {
          stats['尚未回報'].payable += remainingToAllocate;
          stats['尚未回報'].remaining += remainingToAllocate;
        }
      }

      var frRemaining = Number(fr.remaining);
      if (isNaN(frRemaining)) frRemaining = totalAmt - (Number(fr.paidTotal) || 0);
      stats['全部'].payable += totalAmt;
      stats['全部'].paid += (Number(fr.paidTotal) || 0);
      stats['全部'].remaining += frRemaining;
    });

    // ── 2. 繪製統計表 (套用 fmtMoney) ──
    var summaryHtml = '<div class="card" style="margin-bottom:16px; padding:16px;">' +
      '<div style="font-size:22px; font-weight:bold; margin-bottom:12px; color:var(--forest-md);">📊 繳費方式統計</div>' +
      '<div class="tbl-wrap"><table>' +
      '<thead><tr><th>繳費方式</th><th>總應繳</th><th>總已繳</th><th>總未繳</th></tr></thead><tbody>';
    
    ['現金', 'LinePay', 'iPassMoney', '轉帳', '其他', '尚未回報'].forEach(function(m) {
      if (m === '尚未回報' && stats[m].payable === 0 && stats[m].paid === 0 && stats[m].remaining === 0) return;
      // 在每個顯示金額的地方加上 fmtMoney()
      summaryHtml += '<tr><td>' + m + '</td><td>$' + fmtMoney(stats[m].payable) + '</td><td style="color:var(--forest-md)">$' + fmtMoney(stats[m].paid) + '</td><td style="color:var(--red)">$' + fmtMoney(stats[m].remaining) + '</td></tr>';
    });

    summaryHtml += '<tr style="font-weight:700; background:var(--mist); font-size:18px;">' +
      '<td>全部總計</td><td>$' + fmtMoney(stats['全部'].payable) + '</td><td style="color:var(--forest-md)">$' + fmtMoney(stats['全部'].paid) + '</td><td style="color:var(--red)">$' + fmtMoney(stats['全部'].remaining) + '</td></tr>';
    summaryHtml += '</tbody></table></div></div>';

    // ── 3. 繪製明細表 (套用 fmtMoney) ──
    var actualIndiv = (filters.mode === '個人') && (rows[0].memberName !== undefined);
    var detailHtml = '<div class="tbl-wrap"><table><thead><tr>';
    
    if (actualIndiv) {
      detailHtml += '<th>家庭編號</th><th>家庭名稱</th><th>會員編號</th><th>成員(自然名)</th><th>設備/費用項目</th><th>數量</th><th>小計</th><th>家庭狀態</th><th>內部備註</th><th>操作</th>';
    } else {
      detailHtml += '<th>家庭編號</th><th>家庭名稱</th><th>應繳</th><th>已繳</th><th>未繳</th><th>狀態</th><th>方式</th><th>繳費日</th><th>回報備註</th><th>內部備註</th><th>操作</th>';
    }
    detailHtml += '</tr></thead><tbody>';
    
    rows.forEach(function(r) {
      var sc = (r.status === '已完成' || r.status === '已結清') ? 'color:var(--forest-lt)' : (r.status === '未繳' ? 'color:var(--red)' : 'color:var(--amber)');
      var adminNoteDisp = r.adminNote ? ('<span style="color:var(--forest-md);font-weight:500">' + esc(r.adminNote) + '</span>') : '';
      
      detailHtml += '<tr>';
      if (actualIndiv) {
        // 在顯示金額 r.amount 的地方加上 fmtMoney()
        detailHtml += '<td>' + esc(r.familyNo || '') + '</td><td>' + esc(r.familyName) + '</td><td>' + esc(r.memberNo || '') + '</td><td><strong style="color:var(--ink)">' + esc(r.memberName) + '</strong></td><td>' + esc(r.equipName) + '</td><td>' + r.qty + '</td><td>$' + fmtMoney(r.amount) + '</td><td style="' + sc + ';font-weight:700">' + esc(r.status) + '</td><td>' + adminNoteDisp + '</td>';
      } else {
        // 在顯示金額 r.amount, r.paidTotal, r.remaining 的地方加上 fmtMoney()
        detailHtml += '<td>' + esc(r.familyNo || '') + '</td><td>' + esc(r.familyName) + '</td><td>$' + fmtMoney(r.amount) + '</td><td style="color:var(--forest-md)">$' + fmtMoney(r.paidTotal) + '</td><td style="color:var(--red)">$' + fmtMoney(r.remaining) + '</td><td style="' + sc + ';font-weight:700">' + esc(r.status) + '</td><td>' + esc(r.method) + '</td><td class="td-sm">' + esc(r.submitAt) + '</td><td class="td-sm">' + esc(r.note) + '</td><td>' + adminNoteDisp + '</td>';
      }
      
      detailHtml += '<td><div style="display:flex;gap:4px;flex-wrap:wrap;">' +
        '<button class="btn btn-outline btn-xs" onclick="openAdminAdjust(\'' + actId + '\',\'' + r.familyId + '\',\'' + esc(r.familyName) + '\')">調整明細</button>' +
        '<button class="btn btn-green btn-xs" onclick="openAdminNoteModal(\'' + actId + '\',\'' + r.familyId + '\',\'' + esc(r.familyName) + '\',\'' + esc(r.adminNote || '') + '\')">📝備註</button>' +
        '</div></td></tr>';
    });
    detailHtml += '</tbody></table></div>'; 
    el.innerHTML = summaryHtml + detailHtml;
  }).catch(function(e) { console.error(e); el.innerHTML = '<div class="empty">載入失敗</div>'; });
}

function exportPayReport() {
  var actId = document.getElementById('payreport-act').value;
  if (!actId) { toast('請先選擇收費活動', 'warn'); return; }
  var filters = getReportModeAndFilter();
  toast('產生 Excel 中，請稍候...', 'success');
  gas('getPayReport', actId, filters.mode, filters.posFilter).then(function(rows) {
    if (!rows || !rows.length) { toast('沒有資料可匯出', 'warn'); return; }
    var actSel  = document.getElementById('payreport-act'); 
    var actName = actSel.options[actSel.selectedIndex].text;
    var actualIndiv = (filters.mode === '個人') && (rows[0].memberName !== undefined);

    // ★ Excel 匯出也加入了「內部對帳備註」欄位
    var headers = actualIndiv 
      ? ['家庭編號', '家庭名稱', '會員編號', '成員(自然名)', '設備/費用項目', '數量', '小計金額', '家庭繳費狀態', '內部對帳備註']
      : ['家庭編號', '家庭名稱', '應繳金額', '已繳金額', '未繳金額', '繳費狀態', '繳費方式', '繳費日期', '確認日期', '回報備註', '內部對帳備註'];

    var data = [headers];
    rows.forEach(function(r) { 
      if (actualIndiv) {
        data.push([r.familyNo||'', r.familyName||'', r.memberNo||'', r.memberName||'', r.equipName||'', r.qty||0, r.amount||0, r.status||'', r.adminNote||'']);
      } else {
        data.push([r.familyNo||'', r.familyName||'', r.amount||0, r.paidTotal||0, r.remaining||0, r.status||'', r.method||'', r.submitAt||'', r.confirmAt||'', r.note||'', r.adminNote||'']); 
      }
    });
    
    var ws = XLSX.utils.aoa_to_sheet(data); var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '收費報表'); XLSX.writeFile(wb, actName + '_收費報表.xlsx');
    toast('匯出成功！', 'success');
  }).catch(function() { toast('匯出失敗', 'error'); });
}

// ── 新增：管理員內部備註相關函式 ──
var _adminNoteBusy = false;
function openAdminNoteModal(actId, familyId, familyName, currentNote) {
  document.getElementById('anote-actid').value = actId;
  document.getElementById('anote-famid').value = familyId;
  document.getElementById('admin-note-title').textContent = '內部備註：' + familyName;
  document.getElementById('anote-content').value = currentNote || '';
  openModal('modal-admin-note');
}

function saveAdminNoteBtn() {
  if (_adminNoteBusy) return;
  var actId = document.getElementById('anote-actid').value;
  var famId = document.getElementById('anote-famid').value;
  var note = document.getElementById('anote-content').value.trim();
  
  var btn = document.getElementById('anote-save-btn');
  _adminNoteBusy = true;
  btn.disabled = true;
  btn.textContent = '儲存中...';

  gas('saveAdminNote', actId, famId, note).then(function() {
    toast('備註已儲存', 'success');
    closeModal('modal-admin-note');
    loadPayReport(); // 存檔後自動重整報表畫面
  }).catch(function(e) {
    toast('儲存失敗', 'error');
  }).finally(function() {
    _adminNoteBusy = false;
    btn.disabled = false;
    btn.textContent = '儲存備註';
  });
}


// ─────────────────────────────────────────────────────────────────
// 5. type1：使用者選擇設備 Modal
// ─────────────────────────────────────────────────────────────────

var _type1ActId    = '';
var _type1FamId    = '';
var _type1MemberId = '';
var _type1Equips   = [];
var _type1SaveBusy = false;


// ★ 注意函式多接收了一個 btnElement 參數
function openType1Selection(actId, actName, familyId, memberId, btnElement) {
  // 1. 紀錄按鈕原始文字，並將按鈕反灰改為「載入中」
  var originalText = '';
  if (btnElement) {
    originalText = btnElement.textContent;
    btnElement.disabled = true;
    btnElement.textContent = '載入中...';
  }

  _type1ActId = actId; _type1FamId = familyId; _type1MemberId = memberId;
  var memberLabel = '';
  if (memberId) {
    var m = S.members.filter(function(x){return x.id === memberId})[0];
    if (m) memberLabel = m.naturalName || m.name; 
  }
  document.getElementById('type1sel-title').textContent = '選擇設備：' + actName + (memberLabel ? '（' + memberLabel + '）' : '');
  var el = document.getElementById('type1sel-list'); el.innerHTML = '<div class="loading"></div>';
  var btn = document.getElementById('type1sel-save-btn'); btn.disabled = false; btn.textContent = '儲存選擇'; _type1SaveBusy = false;

  gas('getPayEquipsWithLimit', actId, memberId).then(function(equips) {
    _type1Equips = equips.filter(function(e){ return e.category === '使用者'; });
    if (!_type1Equips.length) { el.innerHTML = '<div class="empty">此活動尚未設定可選設備，請聯絡管理員</div>'; openModal('modal-type1-sel'); return; }
    
    var html = '';
    _type1Equips.forEach(function(e) {
      var remainText = '';
      if (e.maxQty && e.maxQty > 0) {
        var color = e.remainQty > 0 ? 'var(--forest-md)' : 'var(--red)';
        remainText = '　<span style="color:' + color + '">剩餘' + e.remainQty + '個</span> / 共' + e.maxQty + '個';
      }
      
      var currentQty = e.myQty || 0;
      var subtotal = currentQty * e.price;
      
      html += '<div style="display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:12px 0">' +
        '<div><div style="font-weight:700;font-size:24px">' + esc(e.name) + '</div><div style="font-size:20px;color:var(--ink-soft)">單價 $' + e.price + remainText + '</div></div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<input id="type1qty-' + e.id + '" type="number" min="0" max="' + e.remainQty + '" value="' + currentQty + '" style="width:75px;text-align:center" oninput="updateType1Sub(\'' + e.id + '\',' + e.price + ')">' +
          '<span style="font-size:22px;color:var(--forest-md);min-width:60px;text-align:right" id="type1sub-' + e.id + '">$' + subtotal + '</span>' +
        '</div></div>';
    });
    el.innerHTML = html; openModal('modal-type1-sel');
  }).catch(function() { 
    el.innerHTML = '<div class="empty">載入失敗</div>'; openModal('modal-type1-sel'); 
  }).finally(function() {
    // 2. 當資料抓完（成功或失敗），把按鈕恢復原狀，讓使用者還可以再按
    if (btnElement) {
      btnElement.disabled = false;
      btnElement.textContent = originalText;
    }
  });
}

function updateType1Sub(equipId, price) {
  var input = document.getElementById('type1qty-' + equipId);
  var q = parseInt(input.value, 10);
  if (isNaN(q)) q = 0;
  
  // ★ 加入前端強制防呆：不允許輸入大於剩餘庫存的數量
  var max = parseInt(input.max, 10);
  if (q > max) {
    q = max;
    input.value = max;
    toast('已達此項目剩餘庫存上限！', 'warn'); // 顯示警告
  }
  
  var sub = document.getElementById('type1sub-' + equipId);
  if (sub) sub.textContent = '$' + (q * price);
}


function saveType1Selection() {
  if (_type1SaveBusy) return;
  var btn = document.getElementById('type1sel-save-btn'); btn.disabled = true; btn.textContent = '儲存中...'; _type1SaveBusy = true;
  var items = [];
  _type1Equips.forEach(function(e) {
    var q = parseInt((document.getElementById('type1qty-' + e.id) || {}).value, 10);
    if (isNaN(q)) q = 0;
    items.push({ equipId: e.id, equipName: e.name, qty: q, unitPrice: e.price });
  });

  gas('saveType1Selection', _type1ActId, _type1MemberId, _type1FamId, items).then(function() {
    toast('選擇已儲存', 'success'); closeModal('modal-type1-sel'); loadPayItems(_type1FamId);
  }).catch(function() { toast('儲存失敗', 'error'); }).finally(function() { _type1SaveBusy = false; btn.disabled = false; btn.textContent = '儲存選擇'; });
}

function populateType2SingleMembers() {
  var sel = document.getElementById('type2-single-member-sel');
  if (!sel) return;
  sel.innerHTML = '<option value="">請選擇特定成員...</option>';
  S.members.forEach(function(m) {
    if (m.position !== '離團') {
      var dispName = m.naturalName || m.name; 
      sel.innerHTML += '<option value="' + m.id + '">' + esc(dispName) + (m.familyName ? ' (' + m.familyName + ')' : '') + '</option>';
    }
  });
}

  showCustomConfirm(msg, function() {
    toast('處理中...', 'info');
    gas('adminSubmitRefund', actId, familyId, amount, '管理員註記退款完成').then(function() {
      toast('退款紀錄已完成！', 'success');
      loadPayItems(familyId);
    }).catch(function(e) {
      toast('操作失敗', 'error');
    });
  });
}

  showCustomConfirm(msg, function() {

    gas('adminSubmitRefund', actId, familyId, amount, '管理員對帳區註記退款').then(function() {
